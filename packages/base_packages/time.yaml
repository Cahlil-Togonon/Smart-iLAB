#substitutions:
  #time_platform: homeassistant

time:
  #- platform: ${time_platform}
  - platform: sntp
    id: sntp_time
  # Define the timezone of the device
    timezone: "${timezone}"
  # Change sync interval from default 5min to 6 hours
    update_interval: 360min    
  # Publish the time the device was last restarted
    on_time_sync:
      then:
        - lambda: |-
            char buf[32];
            strftime(buf, sizeof(buf), "%a %d %b %Y - %I:%M:%S %p", &id(sntp_time).now());
            id(current_timestamp) = std::string(buf);

        # Update last restart time, but only once.
        - if:
            condition:
              lambda: 'return id(device_last_restart).state == "";'
            then:
              - text_sensor.template.publish:
                  id: device_last_restart
                  # state: !lambda 'return id(sntp_time).now().strftime("%a %d %b %Y - %I:%M:%S %p");'
                  state: !lambda 'return id(current_timestamp);'

